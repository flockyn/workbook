name: fix style code

on:
  push:
    branches:
      - master
      - '*.x'
  pull_request:

permissions:
  contents: write

jobs:
  fixer:
    runs-on: ubuntu-latest

    name: Fix Style Code

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Style Fixer
        uses: flockyn/workflows/actions/php-style@v1
        with:
          php-version: 8.2
          mode: 'fix'