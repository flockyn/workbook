name: analysis

on:
  push:
    branches:
      - master
      - '*.x'
  pull_request:

jobs:
  analysis:
    runs-on: ubuntu-latest

    name: Static Analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Analysis
        uses: flockyn/workflows/actions/php-analysis@v1
        with:
          php-version: 8.2
          config: 'phpstan.neon.dist'